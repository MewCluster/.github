name: Docker Build and Push
on:
  workflow_call:
    inputs:
      image-name:
        description: 'The name of the image to build (e.g. ghcr.io/org/repo)'
        required: true
        type: string
      image-tags:
        description: 'Newline-separated list of tags for the image'
        required: true
        type: string
      image-labels:
        description: 'Newline-separated list of labels for the image'
        required: false
        type: string
        default: ''
      context:
        description: 'Build context'
        required: false
        type: string
        default: '.'
      dockerfile:
        description: 'Path to the Dockerfile'
        required: false
        type: string
        default: './Dockerfile'
      platforms:
        description: 'Comma-separated list of target platforms (e.g. linux/amd64,linux/arm64)'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
    secrets:
      registry-username:
        description: 'Username for the container registry'
        required: true
      registry-password:
        description: 'Password or token for the container registry'
        required: true
jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Normalize image inputs to lowercase
        id: normalize
        run: | # shell
          echo "image-name=$(echo '${{ inputs.image-name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "image-tags=$(echo '${{ inputs.image-tags }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract registry from image name
        id: registry
        run: | # shell
          REGISTRY=$(echo "${{ steps.normalize.outputs.image-name }}" | cut -d/ -f1)
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT
      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ steps.registry.outputs.registry }}
          username: ${{ secrets.registry-username }}
          password: ${{ secrets.registry-password }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.normalize.outputs.image-tags }}
          labels: ${{ inputs.image-labels }}